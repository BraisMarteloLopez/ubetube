<script>


let lastScrool = 0;

    function autoScrool()
    {


    


    const contenedor = document.getElementById('texto');
    const elementoResaltado = document.querySelector('.resaltado');

    if(elementoResaltado)
    {

        
        

            const rectElemento = elementoResaltado.getBoundingClientRect();
            const rectContenedor = contenedor.getBoundingClientRect();

            const offset = rectElemento.top - rectContenedor.top - (rectContenedor.height / 2) + (elementoResaltado.clientHeight / 2) - 200;

            
        if(lastScrool < offset)
        {

            console.log(offset);
            console.log(lastScrool);
            console.log("-------------------------");


            lastScrool = offset;

            setTimeout(() => {
                elementoResaltado.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 16);
        }
    }
}






// Ancho máximo permitido para una línea de texto
const maxWidth = 146; // Puedes ajustar este valor según tus necesidades
let push = 0;

// Función para dividir el texto en párrafos, considerando saltos de línea
function dividirPorAncho(texto, maxWidth) {
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');
    context.font = '16px Arial'; // Debe coincidir con la fuente usada en el CSS

    const lineas = texto.split('\n'); // Dividir el texto por saltos de línea
    let parrafos = [];

    lineas.forEach(linea => {
        const palabras = linea.trim().split(' ');
        let nuevaLinea = '';

        palabras.forEach(palabra => {
            const pruebaLinea = nuevaLinea + palabra + ' ';
            const ancho = context.measureText(pruebaLinea).width;
            if (ancho > maxWidth) {
                parrafos.push(nuevaLinea.trim());
                nuevaLinea = palabra + ' ';
            } else {
                nuevaLinea = pruebaLinea;
            }
        });

        if (nuevaLinea.trim() !== '') {
            parrafos.push(nuevaLinea.trim());
        }

        // Añadir un salto de línea entre párrafos si la línea está vacía
        if (linea.trim() === '') {
            parrafos.push('<br>');
        }
    });

    return parrafos;
}

// Función para envolver cada palabra en un span
function envolverPalabrasEnSpans(parrafo) {
    return parrafo.split(' ').map(palabra => `<span class="no-resaltada">${palabra}</span>`).join(' ');
}

// Insertar los párrafos generados en el contenedor de texto
function insertarParrafos(parrafos) {
    const contenedorTexto = document.getElementById('texto');
    contenedorTexto.innerHTML = ''; // Limpiar el contenedor actual

    parrafos.forEach(parrafo => {
        if (parrafo === '<br>') {
            const br = document.createElement('br');
            contenedorTexto.appendChild(br);
        } else if (parrafo.trim() !== '') { // Ignorar párrafos vacíos
            const p = document.createElement('p');
            p.innerHTML = envolverPalabrasEnSpans(parrafo); // Envolver las palabras en spans
            contenedorTexto.appendChild(p);
        }
    });
}

// Evento para cargar el archivo
document.getElementById('archivoInput').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const textoLargo = e.target.result;
            const parrafosTextos = dividirPorAncho(textoLargo, maxWidth);
            insertarParrafos(parrafosTextos);

            // Actualizar la referencia a los párrafos en el DOM después de que se hayan insertado
            const parrafos = document.querySelectorAll('#texto p');

            // Variables para el control del resaltado
            let palabraIndex = 0; // Índice de palabras en el párrafo actual
            let parrafoIndex = 0; // Índice del párrafo actual

            function actualizarResaltado() {
                // Verificación de los límites de los índices
                if (parrafoIndex >= parrafos.length) return;

                // Limpiar el resaltado actual
                parrafos.forEach(p => {
                    const spans = p.querySelectorAll('span');
                    spans.forEach(span => {
                        if (span.className !== 'ya-resaltada') {
                            span.className = 'no-resaltada';
                        }
                    });
                });

                // Obtener todas las palabras (spans) en el párrafo actual
                const spans = parrafos[parrafoIndex].querySelectorAll('span');
                let palabrasResaltadas = 0;

                // Resaltar tres palabras consecutivas
                spans.forEach((span, index) => {
                    if (index >= palabraIndex && palabrasResaltadas < 2) {
                        span.className = 'resaltado';
                        palabrasResaltadas++;
                    } else if (index < palabraIndex) {
                        span.className = 'ya-resaltada'; // Aplicar clase para palabras ya resaltadas
                    } else {
                        span.className = 'no-resaltada';
                    }
                });

                // Desplazar la vista hacia las palabras resaltadas
                const elementoResaltado = document.querySelector('.resaltado');
                if (elementoResaltado) {
                    elementoResaltado.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    //autoScrool();
                }
            }

            function avanzarPalabra() {
                if (parrafoIndex >= parrafos.length){return;} 

                const spans = parrafos[parrafoIndex].querySelectorAll('span');

                // Actualizar las últimas palabras resaltadas del párrafo actual antes de avanzar al siguiente párrafo
                spans.forEach((span, index) => {
                    if (index >= palabraIndex && index < palabraIndex + 3) {
                        span.className = 'ya-resaltada';
                    }
                });

                // Comprobar si hay suficientes palabras restantes en el párrafo para avanzar
                if (palabraIndex + 2 < spans.length) {
                    // Avanzar exactamente 3 palabras
                    palabraIndex += 2;
                } else {
                    // Si alcanzamos el final del párrafo, pasamos al siguiente párrafo
                    palabraIndex = 0;
                    parrafoIndex++;

                    //console.log("get");
                    

                    // Ignorar posibles párrafos vacíos o con solo saltos de línea
                    while (parrafoIndex < parrafos.length && parrafos[parrafoIndex].innerText.trim() === '') {
                        parrafoIndex++;
                    }
                }

                // Actualizar el resaltado después de avanzar
                actualizarResaltado();
                push++
            }

            document.addEventListener('keydown', (event) => {
                if (event.key === 'ArrowRight') {
                    avanzarPalabra();
                }
            });

            // Resaltar las primeras tres palabras al cargar el archivo
            actualizarResaltado();
            push++
        };
        reader.readAsText(file);
    }
});




function getRandomInt(min, max) {
    min = Math.ceil(min);
    max = Math.floor(max);
    return Math.floor(Math.random() * (max - min + 1)) + min;
}


let ojo = document.getElementById("ojo");

let random2 = 0;

let libro = document.getElementById("libro");
let getRandom5 = 0;
let random6 = 0;

            if(getRandom5 == 0) { libro.style.opacity = "0"; }
            else{ libro.style.opacity = "1"; }

let audioContext;
let analyser;
let dataArray;

    document.getElementById('startAudio').addEventListener('change', function (event) {
            
            const file = event.target.files[0];
            document.getElementById('my_video').src = URL.createObjectURL(file);
           // console.log(URL.createObjectURL(file));

            initialize_autoControlAudio();
        });


    function initialize_autoControlAudio()
    {

            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            const video = document.getElementById('my_video');
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaElementSource(video);
            
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            video.volume = 1.0;

            //console.log('AudioContext inicializado y conectado');

            checkSound();
    }



    function checkSound() {
        analyser.getByteFrequencyData(dataArray);
        const sum = dataArray.reduce((a, b) => a + b, 0);
        const average = sum / dataArray.length;

        if (average > 1) {  

            hablando = 1;

        } else {

            hablando = 0;
        }
        setTimeout(checkSound, 16);
    }



</script>
